<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DA-Blog-Project</title>

    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/components.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
  </head>
  <body>
    <header>
      <nav class="header_section">
        <div>
          <img src="./assets/icons/logo 03 1.svg" alt="Blog Logo" />
        </div>
        <div>
          <ol class="header_links">
            <li><a href="#">Highlights</a></li>
            <li><a href="#">FAQ</a></li>
            <li><a href="#">Contact</a></li>
          </ol>
        </div>
      </nav>

      <section class="hero">
        <div class="hero_bg">
          <img
            class="hero_img"
            src="./assets/img/hero-bg.jpg"
            alt="Background Couple with hot air balloon"
          />
          <img
            class="hero_overlay"
            src="./assets/img/Hero_overlay.png"
            alt="Overlay Background"
          />
        </div>
        <div class="hero_text">
          <h1>Cappadocia</h1>
          <p>
            From sunrise balloons to hidden cave dwellings, every moment feels
            unreal in the best way.
          </p>
        </div>
      </section>
    </header>

    <main></main>

    <footer></footer>
  </body>
</html>
